<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <title>Mega Hub Dashboard</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <div class="header-left">
        <img src="icons/icon48.png" alt="Mega Hub Logo" class="logo">
        <h1>Mega Hub</h1>
      </div>
      <div class="theme-switch-container">
        <label for="theme-toggle" class="theme-label-text" id="theme-label">Dark Mode</label>
        <label class="theme-switch">
          <input type="checkbox" id="theme-toggle">
          <span class="slider round"></span>
        </label>
      </div>
    </header>

    <main>
      <div class="setting-group toggle-group">
        <div class="setting-text">
          <span class="setting-title">Reels Button</span>
          <span class="setting-desc">Enable on Reels</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="show-reels-btn" checked>
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-group toggle-group">
        <div class="setting-text">
          <span class="setting-title">Auto-Fetch Carousels</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="download-carousel-all" checked>
          <span class="slider round"></span>
        </label>
      </div>

      <div class="setting-group">
        <label class="setting-title" for="button-style">Button Style</label>
        <select id="button-style" class="modern-select">
          <option value="inline">Inline (Action Bar)</option>
          <option value="overlay">Overlay (On Media)</option>
        </select>
      </div>

      <button id="open-options" class="btn primary-btn options-btn" style="border-radius: 8px;">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
          </path>
        </svg>
        Advanced Settings
      </button>
    </main>
  </div>
  <script src="popup.js"></script>
</body>

</html>
